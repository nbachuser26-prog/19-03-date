<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kỷ niệm của chúng mình</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fce4ec;
            --text-main: #d81b60;
            --glass-bg: rgba(255, 255, 255, 0.75);
        }
        body {
            background-color: var(--bg-color); margin: 0; font-family: 'Nunito', sans-serif; color: var(--text-main);
            overflow-x: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff0f3; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s;
        }
        .btn-start {
            padding: 15px 40px; font-size: 1.5em; font-family: 'Dancing Script', cursive; background: #ff4757; color: white;
            border: none; border-radius: 50px; box-shadow: 0 8px 15px rgba(255, 71, 87, 0.3); cursor: pointer; animation: heartbeat 1.5s infinite;
        }

        #main-content {
            display: none; opacity: 0; transition: opacity 1s ease-in; width: 90%; max-width: 500px; text-align: center; margin-top: 20px; padding-bottom: 30px; z-index: 10;
        }

        h1#custom-title { font-family: 'Dancing Script', cursive; font-size: 3.2em; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .subtitle { font-size: 1.1em; color: #7f8fa6; margin-bottom: 20px; font-style: italic;}

        /* Khung cuộn ảnh */
        .gallery-wrapper {
            position: relative; width: 100%; margin-bottom: 10px;
        }
        .gallery-container {
            width: 100%; overflow-x: auto; padding-bottom: 15px; 
            scrollbar-width: none; touch-action: pan-x; cursor: grab;
            -webkit-overflow-scrolling: touch; 
        }
        .gallery-container::-webkit-scrollbar { display: none; }
        .gallery-container:active { cursor: grabbing; }
        
        .gallery { display: flex; gap: 15px; width: max-content; padding: 0 10px;}
        .gallery img {
            height: 250px; width: auto; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            object-fit: cover; flex-shrink: 0; pointer-events: none; 
        }

        /* Nút quay lại từ đầu (Ẩn lúc đầu) */
        #rewind-btn {
            display: none; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 71, 87, 0.95); color: white; border: none; padding: 12px 25px;
            border-radius: 30px; font-family: 'Nunito', sans-serif; font-weight: bold; font-size: 1em;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.25); z-index: 20;
            animation: pop 0.4s ease-out;
        }

        /* Khung thời gian */
        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.8);
            border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(216, 27, 96, 0.15); margin-bottom: 20px;
        }
        .counter-title { font-size: 1.1em; font-weight: bold; color: #2f3542; margin-bottom: 5px; }
        .time-count { font-size: 1.6em; font-weight: 800; color: #ff4757; }
        .time-details { font-size: 1em; color: #576574; margin-top: 5px; font-weight: bold;} 

        /* Nút mở thư */
        .btn-letter {
            background: transparent; border: 2px solid #ff4757; color: #ff4757; font-family: 'Nunito', sans-serif;
            font-weight: bold; padding: 10px 25px; border-radius: 30px; margin-top: 15px; cursor: pointer; transition: 0.3s;
        }
        .btn-letter:active { background: #ff4757; color: white; }

        /* Modal bức thư (FIX CẤU TRÚC) */
        #letter-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            display: none; justify-content: center; align-items: center; z-index: 200; opacity: 0; transition: 0.3s;
        }
        .paper-wrapper {
            position: relative; width: 85%; max-width: 400px; max-height: 70vh;
        }
        .paper {
            background: #fffdf5; width: 100%; height: 100%; max-height: 70vh; padding: 30px 25px; border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow-y: auto; text-align: left;
            background-image: repeating-linear-gradient(transparent, transparent 29px, #ccc 29px, #ccc 30px); 
            background-attachment: local; /* ĐÂY: DÒNG KẺ TRÔI THEO CHỮ */
            line-height: 30px; box-sizing: border-box;
        }
        /* Nút X đứng im */
        .close-btn {
            position: absolute; top: -12px; right: -12px; font-size: 1.8em; font-weight: bold; color: #ff4757;
            background: white; width: 35px; height: 35px; border-radius: 50%; text-align: center; line-height: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; z-index: 10;
        }
        #letter-content {
            font-family: 'Dancing Script', cursive; font-size: 1.5em; color: #2c3e50; margin-top: 5px;
            white-space: pre-wrap; 
        }

        /* Hiệu ứng rơi rơi */
        .confetti { position: fixed; top: -10px; z-index: 999; pointer-events: none; }
        .falling-item { position: absolute; top: -10vh; animation: fall linear forwards; opacity: 0.7; z-index: 1; pointer-events: none; }
        
        @keyframes heartbeat { 0%, 30%, 100% { transform: scale(1); } 15%, 45% { transform: scale(1.1); } }
        @keyframes fall { to { transform: translateY(105vh) rotate(720deg); } }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <audio id="bg-music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="start-screen">
        <button class="btn-start" onclick="openGift()" id="btn-open-text">Mở quà ❤️</button>
    </div>

    <div id="main-content">
        <h1 id="custom-title">Tên Tiêu Đề</h1>
        <div class="subtitle" id="custom-subtitle">"Dòng phụ đề..."</div>

        <div class="gallery-wrapper">
            <div class="gallery-container" id="slider">
                <div class="gallery" id="gallery-track"></div>
            </div>
            <button id="rewind-btn" onclick="rewindGallery()">🔄 Vuốt lại từ đầu</button>
        </div>

        <div class="glass-panel">
            <div class="counter-title" id="custom-counter-title">Chúng mình đã đi cùng nhau:</div>
            <div id="main-timer" class="time-count">...</div>
            <div id="sub-timer" class="time-details">...</div> 
            <button class="btn-letter" onclick="toggleLetter(true)">Mở Thư Tay 💌</button>
        </div>
    </div>

    <div id="letter-modal">
        <div class="paper-wrapper">
            <div class="close-btn" onclick="toggleLetter(false)">×</div>
            <div class="paper">
                <div id="letter-content"></div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // KHU VỰC CẤU HÌNH DỮ LIỆU CỦA MÀY
        // ==========================================
        const CONFIG = {
            ngayBatDau: '2025-09-19T00:00:00',
            
            nutBamNgoaiCung: "A gift for hyn ☆ ❤️ ",
            tieuDeChinh: "Dear hyniuoilaiuuu ☆",
            phuDe: "Cảm ơn em vì 6 tháng tuyệt vời...",
            loiDanDongHo: "Hành trình của chúng mình:",
            
            danhSachAnh: [
                "1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg", "8.jpg", "9.jpg", "10.jpg",
                "11.jpg", "12.jpg", "13.jpg", "14.jpg", "15.jpg", "16.jpg", "17.jpg", "18.jpg", "19.jpg", "20.jpg",
                "21.jpg", "22.jpg", "23.jpg", "24.jpg", "25.jpg", "26.jpg", "27.jpg"
            ],
            
            thuTay: `Gửi ebeiu của anh,

Trang web này do chính tay anh nghiên cứu gõ và sửa code để tặng em đấy, đỉnh hong? 

Lời đầu tiên, anh cảm ơn em. Cảm ơn vì hành trình 6 tháng tuyệt vời vừa rồi. Cảm ơn vì đã bước cùng anh, qua những ngày khó khăn, giận hờn cũng như những ngày vui vẻ. 

Nhớ 3 tháng trước, mình dặn nhau giai đoạn 3-6 tháng này có thể sẽ khó khăn nên hãy cùng nhau cố gắng. Anh không ngờ mọi thứ lại suôn sẻ, thuận lợi như thế này hehe. Mình chẳng cãi nhau gì cả. Trộm vía tỷ lần. 

Mặc dù đã qua giai đoạn đó rất bình yên rui, nhưng thời gian tới, mình vẫn để ý nhau, vẫn yêu thương chăm sóc nhau, cứ thế phát huy nhaa.

Cuối cùng gửi tới vợ iu của anh. Anh yêu em! Anh yêu em rất nhiều!

Ký tên,
Người mà em thích làm gì thì làm,
Bolshevik 🪖,
Dê núi,
Chồng emm.`
        };
        // ==========================================

        document.getElementById('btn-open-text').innerText = CONFIG.nutBamNgoaiCung;
        document.getElementById('custom-title').innerText = CONFIG.tieuDeChinh;
        document.getElementById('custom-subtitle').innerText = `"${CONFIG.phuDe}"`;
        document.getElementById('custom-counter-title').innerText = CONFIG.loiDanDongHo;
        document.getElementById('letter-content').innerText = CONFIG.thuTay;

        const gallery = document.getElementById('gallery-track');
        CONFIG.danhSachAnh.forEach(anh => {
            const img = document.createElement('img');
            img.src = anh;
            gallery.appendChild(img);
        });

        // ==========================================
        // ĐỘNG CƠ VUỐT ẢNH & KIỂM TRA ĐIỂM DỪNG
        // ==========================================
        const slider = document.getElementById('slider');
        const rewindBtn = document.getElementById('rewind-btn');
        let isDown = false, startX, scrollLeft;
        let animationID;
        let resumeTimeout; 
        let isAtEnd = false; // Cờ kiểm tra chạm đáy

        function autoScroll() {
            if (isAtEnd) return; // Nếu chạm đáy thì ngắt hoàn toàn động cơ

            slider.scrollLeft += 1; 
            
            // Nếu chạm điểm cuối cùng
            if(slider.scrollLeft >= (slider.scrollWidth - slider.clientWidth - 2)) {
                isAtEnd = true;
                rewindBtn.style.display = 'block'; // Bật nút quay lại
                cancelAnimationFrame(animationID);
                return;
            }
            animationID = requestAnimationFrame(autoScroll);
        }

        // Hàm ấn nút quay lại
        function rewindGallery() {
            // Cuộn mượt mà về 0
            slider.scrollTo({ left: 0, behavior: 'smooth' });
            rewindBtn.style.display = 'none';
            isAtEnd = false;
            // Đợi cuộn xong (1s) rồi nổ máy chạy tiếp
            setTimeout(() => {
                animationID = requestAnimationFrame(autoScroll);
            }, 1000);
        }

        // Reset cờ End nếu user tự vuốt ngược lại
        function checkUserScroll() {
            if (slider.scrollLeft < (slider.scrollWidth - slider.clientWidth - 10)) {
                isAtEnd = false;
                rewindBtn.style.display = 'none';
            }
        }

        // --- XỬ LÝ CHUỘT ---
        slider.addEventListener('mousedown', (e) => { 
            isDown = true; 
            cancelAnimationFrame(animationID); 
            clearTimeout(resumeTimeout); 
            startX = e.pageX - slider.offsetLeft; 
            scrollLeft = slider.scrollLeft; 
        });
        slider.addEventListener('mouseleave', () => { 
            if(isDown) { 
                isDown = false; 
                checkUserScroll();
                if(!isAtEnd) resumeTimeout = setTimeout(() => { animationID = requestAnimationFrame(autoScroll); }, 1500); 
            }
        });
        slider.addEventListener('mouseup', () => { 
            isDown = false; 
            checkUserScroll();
            if(!isAtEnd) resumeTimeout = setTimeout(() => { animationID = requestAnimationFrame(autoScroll); }, 1500); 
        });
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2; 
            slider.scrollLeft = scrollLeft - walk;
            checkUserScroll();
        });
        
        // --- XỬ LÝ CẢM ỨNG ---
        slider.addEventListener('touchstart', () => { 
            cancelAnimationFrame(animationID); 
            clearTimeout(resumeTimeout); 
        }, { passive: true });
        
        slider.addEventListener('touchend', () => { 
            checkUserScroll();
            if(!isAtEnd) {
                resumeTimeout = setTimeout(() => {
                    animationID = requestAnimationFrame(autoScroll);
                }, 1500);
            }
        });

        // ==========================================
        // HÀM CHÍNH: MỞ QUÀ
        // ==========================================
        function openGift() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('start-screen').style.display = 'none'; }, 600);
            const main = document.getElementById('main-content');
            main.style.display = 'block';
            setTimeout(() => { main.style.opacity = '1'; }, 100);

            const music = document.getElementById('bg-music');
            music.volume = 0.6; music.play().catch(e => console.log(e));
            
            celebrateNow();
            setInterval(createFallingItem, 400); 
            setInterval(updateTimer, 1000); 
            updateTimer();
            requestAnimationFrame(autoScroll);
        }

        function toggleLetter(show) {
            const modal = document.getElementById('letter-modal');
            if(show) {
                modal.style.display = 'flex';
                setTimeout(() => modal.style.opacity = '1', 10);
            } else {
                modal.style.opacity = '0';
                setTimeout(() => modal.style.display = 'none', 300);
            }
        }

        // ==========================================
        // TÍNH TOÁN THỜI GIAN
        // ==========================================
        function updateTimer() {
            const startDate = new Date(CONFIG.ngayBatDau);
            const now = new Date();
            
            let months = (now.getFullYear() - startDate.getFullYear()) * 12 + (now.getMonth() - startDate.getMonth());
            let days = now.getDate() - startDate.getDate();
            if (days < 0) { months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            
            const diffMS = now - startDate;
            const h = Math.floor((diffMS % 86400000) / 3600000);
            const m = Math.floor((diffMS % 3600000) / 60000);
            const s = Math.floor((diffMS % 60000) / 1000);

            document.getElementById('main-timer').innerHTML = `${months} Tháng, ${days} Ngày`;
            document.getElementById('sub-timer').innerHTML = `${h} Giờ : ${m} Phút : ${s} Giây`;
        }

        function celebrateNow() {
            document.body.style.backgroundColor = "#ffccd5";
            const colors = ['#ff4757', '#2ecc71', '#3498db', '#f1c40f', '#e84393'];
            for (let i = 0; i < 150; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.width = Math.random() * 10 + 5 + 'px'; conf.style.height = Math.random() * 5 + 5 + 'px';
                conf.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 5000);
            }
        }

        function createFallingItem() {
            const item = document.createElement('div');
            item.classList.add('falling-item');
            const icons = ['🌸', '💖', '✨', '💕', '🥰'];
            item.innerText = icons[Math.floor(Math.random() * icons.length)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = Math.random() * 3 + 4 + 's'; 
            item.style.fontSize = Math.random() * 20 + 15 + 'px'; 
            document.body.appendChild(item);
            setTimeout(() => { item.remove(); }, 7000);
        }
    </script>
</body>
</html>
